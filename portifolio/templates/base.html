{% load static %}

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Meu Portfólio{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static '/css/style.css' %}">
    <link rel="stylesheet" href="{% static '/css/details.css' %}">
    <link rel="stylesheet" href="{% static '/css/home.css' %}">
    <link rel="stylesheet" href="{% static '/css/projetos.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <script>
        function toggleMenu() {
            document.getElementById('nav-menu').classList.toggle('active');
        }
    </script>

    
</head>
<body>
    <header>
        <div class="header-content">
            <a href="{% url 'home' %}" class="logo">HanneschJr<span>.</span>dev</a>
            <button class="mobile-menu-btn" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <nav id="nav-menu">
                <a href="{% url 'home' %}" {% if request.resolver_match.url_name == 'home' %}class="active"{% endif %}>Sobre</a>
                <a href="{% url 'lista_projetos' %}" {% if request.resolver_match.url_name == 'lista_projetos' %}class="active"{% endif %}>Projetos</a>
                <a href="{% url 'home' %}#contato">Contato</a>
            </nav>
        </div>
    </header>
    
    <main>
        {% block content %}{% endblock %}
    </main>
    
    <footer>
        <div class="footer-content">
            <div class="footer-links">
                <a href="https://github.com/hanneschjr" target="_blank" rel="noopener">GitHub</a>
                <a href="https://linkedin.com/in/antonio" target="_blank" rel="noopener">LinkedIn</a>
                <a href="mailto:antonio@example.com">Email</a>
            </div>
            <p>&copy; 2026 HanneschJr. Todos os direitos reservados.</p>
        </div>
    </footer>


</body>
</html>
